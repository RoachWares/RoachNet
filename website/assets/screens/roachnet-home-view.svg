<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="160" y1="60" x2="1430" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121923"/>
      <stop offset="1" stop-color="#090D12"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1220 220) rotate(130) scale(420 420)">
      <stop stop-color="#5C8DFF" stop-opacity=".30"/>
      <stop offset="1" stop-color="#5C8DFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 840) rotate(-12) scale(360 240)">
      <stop stop-color="#32FF7E" stop-opacity=".22"/>
      <stop offset="1" stop-color="#32FF7E" stop-opacity="0"/>
    </radialGradient>
    <style>
      .title { fill: #F7FAFC; font: 700 42px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; letter-spacing: -1.2px; }
      .subtitle { fill: rgba(226,232,240,.78); font: 500 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .kicker { fill: rgba(163,176,194,.72); font: 700 15px 'SF Mono', 'JetBrains Mono', monospace; letter-spacing: 1.8px; text-transform: uppercase; }
      .mono { fill: rgba(210,219,230,.78); font: 600 16px 'SF Mono', 'JetBrains Mono', monospace; }
      .navTitle { fill: #F7FAFC; font: 700 24px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .navLabel { fill: rgba(218,226,237,.88); font: 600 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .navSub { fill: rgba(163,176,194,.72); font: 500 14px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .metricTitle { fill: rgba(163,176,194,.78); font: 700 14px 'SF Mono', 'JetBrains Mono', monospace; letter-spacing: 1.3px; }
      .metricValue { fill: #F7FAFC; font: 700 26px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .metricBody, .cardBody { fill: rgba(218,226,237,.74); font: 500 16px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .cardTitle { fill: #F7FAFC; font: 700 25px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .pill { fill: rgba(17,23,31,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.2; }
      .tagBlue { fill: rgba(92,141,255,.16); stroke: rgba(92,141,255,.34); stroke-width: 1.2; }
      .tagGreen { fill: rgba(50,255,126,.14); stroke: rgba(50,255,126,.30); stroke-width: 1.2; }
      .tagMagenta { fill: rgba(191,90,242,.14); stroke: rgba(191,90,242,.30); stroke-width: 1.2; }
      .window { fill: rgba(12,16,22,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .panel { fill: rgba(19,25,33,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.2; }
      .panelSoft { fill: rgba(23,30,39,.86); stroke: rgba(255,255,255,.06); stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="48" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="48" fill="url(#glowBlue)"/>
  <rect width="1600" height="1000" rx="48" fill="url(#glowGreen)"/>

  <rect x="64" y="58" width="1472" height="884" rx="36" class="window"/>
  <circle cx="104" cy="100" r="8" fill="#FF6B81"/>
  <circle cx="130" cy="100" r="8" fill="#FFC145"/>
  <circle cx="156" cy="100" r="8" fill="#32FF7E"/>

  <rect x="92" y="128" width="286" height="780" rx="28" class="panel"/>
  <text x="126" y="190" class="navTitle">RoachNet</text>
  <text x="126" y="220" class="subtitle">Your local command center</text>

  <g transform="translate(112 270)">
    <rect width="246" height="74" rx="20" fill="rgba(92,141,255,.14)" stroke="rgba(92,141,255,.34)" stroke-width="1.2"/>
    <text x="22" y="31" class="navLabel">Home</text>
    <text x="22" y="54" class="navSub">Command grid</text>
  </g>
  <g transform="translate(112 358)">
    <text x="22" y="31" class="navLabel">RoachClaw</text>
    <text x="22" y="54" class="navSub">Models and skills</text>
  </g>
  <g transform="translate(112 438)">
    <text x="22" y="31" class="navLabel">Maps</text>
    <text x="22" y="54" class="navSub">Offline regions</text>
  </g>
  <g transform="translate(112 518)">
    <text x="22" y="31" class="navLabel">Education</text>
    <text x="22" y="54" class="navSub">Wikipedia and collections</text>
  </g>
  <g transform="translate(112 598)">
    <text x="22" y="31" class="navLabel">Archives</text>
    <text x="22" y="54" class="navSub">Saved websites</text>
  </g>
  <g transform="translate(112 678)">
    <text x="22" y="31" class="navLabel">Vault</text>
    <text x="22" y="54" class="navSub">Contained sources</text>
  </g>
  <g transform="translate(112 758)">
    <text x="22" y="31" class="navLabel">Runtime</text>
    <text x="22" y="54" class="navSub">Service health</text>
  </g>

  <rect x="404" y="128" width="1104" height="780" rx="28" class="panel"/>
  <text x="448" y="196" class="title">Home</text>
  <text x="448" y="228" class="subtitle">Command grid</text>

  <rect x="1262" y="154" width="190" height="42" rx="21" class="tagGreen"/>
  <text x="1306" y="180" class="mono" fill="#E5FFF0">Local ready</text>

  <rect x="448" y="258" width="1016" height="76" rx="22" class="pill"/>
  <text x="480" y="289" class="kicker">Command Bar</text>
  <text x="480" y="317" class="subtitle">Jump between maps, education, archives, models, runtime, and sources from one place.</text>

  <text x="448" y="388" class="kicker">Home</text>
  <text x="448" y="430" class="title">Offline command grid for maps, archives, local AI, and field ops.</text>
  <text x="448" y="466" class="subtitle">RoachNet keeps your maps, archives, and local AI online when everything else drops.</text>

  <g transform="translate(448 504)">
    <rect width="206" height="48" rx="20" class="pill"/>
    <text x="18" y="30" class="mono">Offline First · Maps, Docs, AI</text>
    <rect x="220" width="190" height="48" rx="20" class="pill"/>
    <text x="238" y="30" class="mono">Runtime · native_local</text>
    <rect x="424" width="256" height="48" rx="20" class="pill"/>
    <text x="442" y="30" class="mono">Default Model · qwen2.5-coder:7b</text>
  </g>

  <g transform="translate(448 582)">
    <rect width="238" height="122" rx="22" class="panelSoft"/>
    <text x="20" y="30" class="metricTitle">Network State</text>
    <text x="20" y="66" class="metricValue">Internet Detected</text>
    <text x="20" y="96" class="metricBody">RoachNet can fetch updates and content packs.</text>

    <rect x="258" width="238" height="122" rx="22" class="panelSoft"/>
    <text x="278" y="30" class="metricTitle">AI Runtime</text>
    <text x="278" y="66" class="metricValue">Connected</text>
    <text x="278" y="96" class="metricBody">Ollama is live. OpenClaw can catch up later.</text>

    <rect x="516" width="238" height="122" rx="22" class="panelSoft"/>
    <text x="536" y="30" class="metricTitle">Storage &amp; Archives</text>
    <text x="536" y="66" class="metricValue">12 Files</text>
    <text x="536" y="96" class="metricBody">Maps, ZIM archives, benchmarks, and notes stay local.</text>

    <rect x="774" width="238" height="122" rx="22" class="panelSoft"/>
    <text x="794" y="30" class="metricTitle">Privacy</text>
    <text x="794" y="66" class="metricValue">Local-First Ops</text>
    <text x="794" y="96" class="metricBody">Traffic and content access stay close to the machine.</text>
  </g>

  <text x="448" y="760" class="kicker">Command Grid</text>
  <g transform="translate(448 786)">
    <rect width="322" height="88" rx="22" class="panelSoft"/>
    <text x="20" y="34" class="cardTitle">Maps</text>
    <text x="20" y="60" class="cardBody">View offline maps.</text>
    <rect x="236" y="20" width="66" height="28" rx="14" class="tagBlue"/>
    <text x="250" y="39" class="mono" fill="#D7E4FF">Core</text>

    <rect x="340" width="322" height="88" rx="22" class="panelSoft"/>
    <text x="360" y="34" class="cardTitle">AI Control</text>
    <text x="360" y="60" class="cardBody">Link Ollama and OpenClaw runtimes, verify endpoints.</text>
    <rect x="576" y="20" width="74" height="28" rx="14" class="tagMagenta"/>
    <text x="590" y="39" class="mono" fill="#F6D8FF">Runtime</text>

    <rect x="680" width="322" height="88" rx="22" class="panelSoft"/>
    <text x="700" y="34" class="cardTitle">Easy Setup</text>
    <text x="700" y="60" class="cardBody">Connect runtimes, download content, and stage your toolkit.</text>
    <rect x="906" y="20" width="76" height="28" rx="14" class="tagGreen"/>
    <text x="920" y="39" class="mono" fill="#E5FFF0">Configured</text>
  </g>
  <g transform="translate(448 888)">
    <rect width="240" height="24" rx="12" fill="rgba(255,255,255,.05)"/>
    <text x="12" y="17" class="mono">Diagnostics · Stealth · Debug Info</text>
  </g>
</svg>
