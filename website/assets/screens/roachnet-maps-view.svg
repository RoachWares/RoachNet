<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="180" y1="60" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111821"/>
      <stop offset="1" stop-color="#090D12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 260) rotate(128) scale(460 380)">
      <stop stop-color="#32FF7E" stop-opacity=".22"/>
      <stop offset=".44" stop-color="#5C8DFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#5C8DFF" stop-opacity="0"/>
    </radialGradient>
    <style>
      .window { fill: rgba(12,16,22,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .panel { fill: rgba(19,25,33,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.2; }
      .soft { fill: rgba(23,30,39,.86); stroke: rgba(255,255,255,.06); stroke-width: 1.2; }
      .title { fill: #F7FAFC; font: 700 42px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; letter-spacing: -1.2px; }
      .subtitle { fill: rgba(226,232,240,.78); font: 500 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .mono { fill: rgba(210,219,230,.82); font: 600 15px 'SF Mono', 'JetBrains Mono', monospace; }
      .kicker { fill: rgba(163,176,194,.72); font: 700 15px 'SF Mono', 'JetBrains Mono', monospace; letter-spacing: 1.8px; }
      .navLabel { fill: rgba(218,226,237,.88); font: 600 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .navSub, .body { fill: rgba(218,226,237,.74); font: 500 15px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .cardTitle { fill: #F7FAFC; font: 700 23px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .tagBlue { fill: rgba(92,141,255,.16); stroke: rgba(92,141,255,.34); stroke-width: 1.2; }
      .tagGreen { fill: rgba(50,255,126,.14); stroke: rgba(50,255,126,.30); stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="48" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="48" fill="url(#glow)"/>

  <rect x="64" y="58" width="1472" height="884" rx="36" class="window"/>
  <rect x="92" y="128" width="286" height="780" rx="28" class="panel"/>
  <text x="126" y="188" fill="#F7FAFC" font-size="24" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">RoachNet</text>
  <text x="126" y="218" class="subtitle">Your local command center</text>

  <g transform="translate(112 270)">
    <text x="22" y="31" class="navLabel">Home</text>
    <text x="22" y="54" class="navSub">Command grid</text>
  </g>
  <g transform="translate(112 350)">
    <text x="22" y="31" class="navLabel">RoachClaw</text>
    <text x="22" y="54" class="navSub">Models and skills</text>
  </g>
  <g transform="translate(112 430)">
    <rect width="246" height="74" rx="20" fill="rgba(92,141,255,.14)" stroke="rgba(92,141,255,.34)" stroke-width="1.2"/>
    <text x="22" y="31" class="navLabel">Maps</text>
    <text x="22" y="54" class="navSub">Offline regions</text>
  </g>
  <g transform="translate(112 518)">
    <text x="22" y="31" class="navLabel">Education</text>
    <text x="22" y="54" class="navSub">Wikipedia and collections</text>
  </g>
  <g transform="translate(112 598)">
    <text x="22" y="31" class="navLabel">Archives</text>
    <text x="22" y="54" class="navSub">Saved websites</text>
  </g>
  <g transform="translate(112 678)">
    <text x="22" y="31" class="navLabel">Vault</text>
    <text x="22" y="54" class="navSub">Contained sources</text>
  </g>

  <rect x="404" y="128" width="1104" height="780" rx="28" class="panel"/>
  <text x="448" y="196" class="title">Maps</text>
  <text x="448" y="228" class="subtitle">Offline regions</text>

  <rect x="1208" y="152" width="132" height="40" rx="20" class="tagBlue"/>
  <text x="1238" y="177" class="mono" fill="#D7E4FF">Open Full Maps</text>
  <rect x="1358" y="152" width="106" height="40" rx="20" class="tagGreen"/>
  <text x="1388" y="177" class="mono" fill="#E5FFF0">Install Base Assets</text>

  <text x="448" y="292" class="kicker">Maps</text>
  <text x="448" y="334" class="title">Offline regions, ready to stage.</text>
  <text x="448" y="370" class="subtitle">Download region packs, install the base atlas, and open the full map surface when you need it.</text>

  <g transform="translate(448 408)">
    <rect width="1016" height="116" rx="24" class="soft"/>
    <text x="22" y="32" class="kicker">Map Downloads</text>
    <rect x="22" y="52" width="972" height="18" rx="9" fill="rgba(255,255,255,.06)"/>
    <rect x="22" y="52" width="612" height="18" rx="9" fill="#32FF7E"/>
    <text x="22" y="96" class="body">us-midwest-base-pack.mbtiles · 63%</text>
    <text x="718" y="96" class="mono">Queued through the local runtime.</text>
  </g>

  <g transform="translate(448 552)">
    <rect width="324" height="270" rx="24" class="soft"/>
    <text x="22" y="32" class="cardTitle">Indiana Field Pack</text>
    <text x="22" y="58" class="body">Offline regional map pack</text>
    <rect x="22" y="84" width="280" height="118" rx="18" fill="rgba(12,17,24,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <path d="M54 138C108 106 140 116 164 150C188 182 232 180 266 136" stroke="#5C8DFF" stroke-width="7" stroke-linecap="round"/>
    <circle cx="78" cy="126" r="11" fill="#32FF7E"/>
    <circle cx="250" cy="146" r="11" fill="#BF5AF2"/>
    <text x="22" y="228" class="mono">Coverage · 8 / 10 ready</text>
    <rect x="22" y="240" width="180" height="40" rx="18" class="tagGreen"/>
    <text x="62" y="266" class="mono" fill="#E5FFF0">Download Collection</text>

    <rect x="346" width="324" height="270" rx="24" class="soft"/>
    <text x="368" y="32" class="cardTitle">US Midwest Offline</text>
    <text x="368" y="58" class="body">Offline regional map pack</text>
    <rect x="368" y="84" width="280" height="118" rx="18" fill="rgba(12,17,24,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <path d="M392 168C442 128 478 128 516 150C554 172 592 168 626 126" stroke="#5C8DFF" stroke-width="7" stroke-linecap="round"/>
    <circle cx="420" cy="154" r="11" fill="#32FF7E"/>
    <circle cx="606" cy="136" r="11" fill="#BF5AF2"/>
    <text x="368" y="228" class="mono">Coverage · 4 / 9 ready</text>
    <rect x="368" y="240" width="180" height="40" rx="18" class="tagBlue"/>
    <text x="408" y="266" class="mono" fill="#D7E4FF">Download Collection</text>

    <rect x="692" width="324" height="270" rx="24" class="soft"/>
    <text x="714" y="32" class="cardTitle">Education handoff</text>
    <text x="714" y="58" class="body">Wikipedia and curated reference tiers are staged beside maps.</text>
    <rect x="714" y="88" width="280" height="42" rx="16" fill="rgba(17,23,31,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="734" y="116" class="mono">Wikipedia · 100 mini</text>
    <rect x="714" y="140" width="280" height="42" rx="16" fill="rgba(17,23,31,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="734" y="168" class="mono">Collections · 7 categories</text>
    <rect x="714" y="200" width="160" height="40" rx="18" class="tagGreen"/>
    <text x="754" y="226" class="mono" fill="#E5FFF0">Open Docs</text>
  </g>
</svg>
