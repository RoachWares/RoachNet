<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="220" y1="80" x2="1420" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111821"/>
      <stop offset="1" stop-color="#090D12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 220) rotate(132) scale(420 420)">
      <stop stop-color="#BF5AF2" stop-opacity=".28"/>
      <stop offset=".52" stop-color="#5C8DFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#5C8DFF" stop-opacity="0"/>
    </radialGradient>
    <style>
      .window { fill: rgba(12,16,22,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .panel { fill: rgba(19,25,33,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.2; }
      .soft { fill: rgba(23,30,39,.86); stroke: rgba(255,255,255,.06); stroke-width: 1.2; }
      .title { fill: #F7FAFC; font: 700 42px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; letter-spacing: -1.2px; }
      .subtitle { fill: rgba(226,232,240,.78); font: 500 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .mono { fill: rgba(210,219,230,.82); font: 600 15px 'SF Mono', 'JetBrains Mono', monospace; }
      .kicker { fill: rgba(163,176,194,.72); font: 700 15px 'SF Mono', 'JetBrains Mono', monospace; letter-spacing: 1.8px; }
      .navLabel { fill: rgba(218,226,237,.88); font: 600 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .navSub, .body { fill: rgba(218,226,237,.74); font: 500 15px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .cardTitle { fill: #F7FAFC; font: 700 23px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .tagBlue { fill: rgba(92,141,255,.16); stroke: rgba(92,141,255,.34); stroke-width: 1.2; }
      .tagGreen { fill: rgba(50,255,126,.14); stroke: rgba(50,255,126,.30); stroke-width: 1.2; }
      .tagMagenta { fill: rgba(191,90,242,.14); stroke: rgba(191,90,242,.30); stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="48" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="48" fill="url(#glow)"/>

  <rect x="64" y="58" width="1472" height="884" rx="36" class="window"/>
  <rect x="92" y="128" width="286" height="780" rx="28" class="panel"/>
  <text x="126" y="188" fill="#F7FAFC" font-size="24" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">RoachNet</text>
  <text x="126" y="218" class="subtitle">Your local command center</text>

  <g transform="translate(112 270)">
    <text x="22" y="31" class="navLabel">Home</text>
    <text x="22" y="54" class="navSub">Command grid</text>
  </g>
  <g transform="translate(112 350)">
    <rect width="246" height="74" rx="20" fill="rgba(191,90,242,.14)" stroke="rgba(191,90,242,.34)" stroke-width="1.2"/>
    <text x="22" y="31" class="navLabel">RoachClaw</text>
    <text x="22" y="54" class="navSub">Models and skills</text>
  </g>
  <g transform="translate(112 438)">
    <text x="22" y="31" class="navLabel">Maps</text>
    <text x="22" y="54" class="navSub">Offline regions</text>
  </g>
  <g transform="translate(112 518)">
    <text x="22" y="31" class="navLabel">Education</text>
    <text x="22" y="54" class="navSub">Wikipedia and collections</text>
  </g>
  <g transform="translate(112 598)">
    <text x="22" y="31" class="navLabel">Archives</text>
    <text x="22" y="54" class="navSub">Saved websites</text>
  </g>
  <g transform="translate(112 678)">
    <text x="22" y="31" class="navLabel">Vault</text>
    <text x="22" y="54" class="navSub">Contained sources</text>
  </g>
  <g transform="translate(112 758)">
    <text x="22" y="31" class="navLabel">Runtime</text>
    <text x="22" y="54" class="navSub">Service health</text>
  </g>

  <rect x="404" y="128" width="1104" height="780" rx="28" class="panel"/>
  <text x="448" y="196" class="title">RoachClaw</text>
  <text x="448" y="228" class="subtitle">Models and skills</text>

  <rect x="1114" y="152" width="138" height="40" rx="20" class="tagBlue"/>
  <text x="1142" y="177" class="mono" fill="#D7E4FF">Open AI Control</text>
  <rect x="1270" y="152" width="146" height="40" rx="20" class="tagGreen"/>
  <text x="1308" y="177" class="mono" fill="#E5FFF0">Apply Defaults</text>

  <text x="448" y="292" class="kicker">RoachClaw</text>
  <text x="448" y="334" class="title">Local AI, aligned.</text>
  <text x="448" y="370" class="subtitle">A fast local default first, with room to grow later.</text>

  <g transform="translate(448 408)">
    <rect width="230" height="54" rx="18" class="soft"/>
    <text x="18" y="24" class="kicker">Ollama</text>
    <text x="18" y="42" class="mono">Local</text>
    <rect x="246" width="230" height="54" rx="18" class="soft"/>
    <text x="264" y="24" class="kicker">OpenClaw</text>
    <text x="264" y="42" class="mono">Unavailable</text>
    <rect x="492" width="460" height="54" rx="18" class="soft"/>
    <text x="510" y="24" class="kicker">Workspace</text>
    <text x="510" y="42" class="mono">storage/openclaw</text>
  </g>

  <g transform="translate(448 498)">
    <rect width="330" height="180" rx="24" class="soft"/>
    <text x="22" y="32" class="kicker">Models</text>
    <text x="22" y="68" class="cardTitle">qwen2.5-coder:7b</text>
    <text x="22" y="98" class="body">Fast default for local prompting.</text>
    <text x="22" y="126" class="mono">llama3.2:3b</text>
    <text x="22" y="148" class="mono">granite3.2:8b</text>

    <rect x="352" width="330" height="180" rx="24" class="soft"/>
    <text x="374" y="32" class="kicker">Skills</text>
    <text x="374" y="68" class="cardTitle">No OpenClaw skills yet.</text>
    <text x="374" y="98" class="body">RoachNet can still use local Ollama while the agent runtime catches up.</text>
    <rect x="374" y="122" width="118" height="30" rx="15" class="tagMagenta"/>
    <text x="396" y="142" class="mono" fill="#F6D8FF">Agent lane</text>

    <rect x="704" width="312" height="180" rx="24" class="soft"/>
    <text x="726" y="32" class="kicker">Workbench</text>
    <rect x="726" y="52" width="244" height="38" rx="16" fill="rgba(255,255,255,.04)"/>
    <text x="744" y="77" class="body">Try a quick prompt when you want to test the local model.</text>
    <rect x="726" y="102" width="178" height="34" rx="16" fill="rgba(255,255,255,.04)"/>
    <text x="742" y="124" class="body">User · Summarize my notes.</text>
    <rect x="726" y="144" width="236" height="34" rx="16" fill="rgba(50,255,126,.10)"/>
    <text x="742" y="166" fill="#F7FAFC" font-size="15" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">RoachClaw · Running locally. Qwen is ready.</text>
  </g>

  <g transform="translate(448 712)">
    <rect width="1016" height="160" rx="24" class="soft"/>
    <text x="22" y="32" class="kicker">Workbench</text>
    <rect x="22" y="54" width="758" height="76" rx="20" fill="rgba(17,23,31,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="48" y="88" class="body">Test the local model</text>
    <text x="48" y="112" class="mono">qwen2.5-coder:7b</text>
    <rect x="820" y="66" width="160" height="48" rx="20" class="tagGreen"/>
    <text x="874" y="95" class="mono" fill="#E5FFF0">Send</text>
  </g>
</svg>
