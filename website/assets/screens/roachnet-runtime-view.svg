<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" fill="none">
  <defs>
    <linearGradient id="bg" x1="180" y1="60" x2="1460" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111821"/>
      <stop offset="1" stop-color="#090D12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 240) rotate(135) scale(420 420)">
      <stop stop-color="#5C8DFF" stop-opacity=".26"/>
      <stop offset=".52" stop-color="#32FF7E" stop-opacity=".18"/>
      <stop offset="1" stop-color="#32FF7E" stop-opacity="0"/>
    </radialGradient>
    <style>
      .window { fill: rgba(12,16,22,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .panel { fill: rgba(19,25,33,.92); stroke: rgba(255,255,255,.08); stroke-width: 1.2; }
      .soft { fill: rgba(23,30,39,.86); stroke: rgba(255,255,255,.06); stroke-width: 1.2; }
      .title { fill: #F7FAFC; font: 700 42px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; letter-spacing: -1.2px; }
      .subtitle { fill: rgba(226,232,240,.78); font: 500 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .mono { fill: rgba(210,219,230,.82); font: 600 15px 'SF Mono', 'JetBrains Mono', monospace; }
      .kicker { fill: rgba(163,176,194,.72); font: 700 15px 'SF Mono', 'JetBrains Mono', monospace; letter-spacing: 1.8px; }
      .navLabel { fill: rgba(218,226,237,.88); font: 600 18px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .navSub, .body { fill: rgba(218,226,237,.74); font: 500 15px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .cardTitle { fill: #F7FAFC; font: 700 23px -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }
      .tagBlue { fill: rgba(92,141,255,.16); stroke: rgba(92,141,255,.34); stroke-width: 1.2; }
      .tagGreen { fill: rgba(50,255,126,.14); stroke: rgba(50,255,126,.30); stroke-width: 1.2; }
    </style>
  </defs>

  <rect width="1600" height="1000" rx="48" fill="url(#bg)"/>
  <rect width="1600" height="1000" rx="48" fill="url(#glow)"/>

  <rect x="64" y="58" width="1472" height="884" rx="36" class="window"/>
  <rect x="92" y="128" width="286" height="780" rx="28" class="panel"/>
  <text x="126" y="188" fill="#F7FAFC" font-size="24" font-weight="700" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif">RoachNet</text>
  <text x="126" y="218" class="subtitle">Your local command center</text>

  <g transform="translate(112 270)">
    <text x="22" y="31" class="navLabel">Home</text>
    <text x="22" y="54" class="navSub">Command grid</text>
  </g>
  <g transform="translate(112 350)">
    <text x="22" y="31" class="navLabel">RoachClaw</text>
    <text x="22" y="54" class="navSub">Models and skills</text>
  </g>
  <g transform="translate(112 430)">
    <text x="22" y="31" class="navLabel">Maps</text>
    <text x="22" y="54" class="navSub">Offline regions</text>
  </g>
  <g transform="translate(112 510)">
    <text x="22" y="31" class="navLabel">Education</text>
    <text x="22" y="54" class="navSub">Wikipedia and collections</text>
  </g>
  <g transform="translate(112 590)">
    <text x="22" y="31" class="navLabel">Archives</text>
    <text x="22" y="54" class="navSub">Saved websites</text>
  </g>
  <g transform="translate(112 670)">
    <text x="22" y="31" class="navLabel">Vault</text>
    <text x="22" y="54" class="navSub">Contained sources</text>
  </g>
  <g transform="translate(112 750)">
    <rect width="246" height="74" rx="20" fill="rgba(50,255,126,.14)" stroke="rgba(50,255,126,.34)" stroke-width="1.2"/>
    <text x="22" y="31" class="navLabel">Runtime</text>
    <text x="22" y="54" class="navSub">Service health</text>
  </g>

  <rect x="404" y="128" width="1104" height="780" rx="28" class="panel"/>
  <text x="448" y="196" class="title">Runtime</text>
  <text x="448" y="228" class="subtitle">Service health</text>

  <rect x="1278" y="152" width="90" height="40" rx="20" class="tagBlue"/>
  <text x="1304" y="177" class="mono" fill="#D7E4FF">Refresh</text>
  <rect x="1384" y="152" width="82" height="40" rx="20" class="tagGreen"/>
  <text x="1410" y="177" class="mono" fill="#E5FFF0">Settings</text>

  <text x="448" y="292" class="kicker">Runtime</text>
  <text x="448" y="334" class="title">Contained and recoverable.</text>
  <text x="448" y="370" class="subtitle">One local gateway in front, support services quietly doing their job behind it.</text>

  <g transform="translate(448 408)">
    <rect width="1016" height="164" rx="24" class="soft"/>
    <text x="22" y="32" class="kicker">Runtime Summary</text>
    <rect x="22" y="54" width="972" height="32" rx="16" fill="rgba(17,23,31,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="42" y="75" class="mono">Install Root · ~/Applications/RoachNet</text>
    <rect x="22" y="96" width="972" height="32" rx="16" fill="rgba(17,23,31,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="42" y="117" class="mono">Server Target · admin/build/bin/server.js</text>
    <rect x="22" y="138" width="972" height="32" rx="16" fill="rgba(17,23,31,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="42" y="159" class="mono">Host · roach-mini.local</text>
  </g>

  <g transform="translate(448 602)">
    <rect width="324" height="236" rx="24" class="soft"/>
    <text x="22" y="32" class="kicker">CPU</text>
    <text x="22" y="70" class="cardTitle">Apple M4 Pro</text>
    <text x="22" y="98" class="body">Apple Silicon optimized path</text>
    <rect x="22" y="124" width="280" height="78" rx="18" fill="rgba(12,17,24,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="42" y="158" class="mono">ollama · live</text>
    <text x="42" y="186" class="mono">queue worker · live</text>

    <rect x="346" width="324" height="236" rx="24" class="soft"/>
    <text x="368" y="32" class="kicker">Memory</text>
    <text x="368" y="70" class="cardTitle">48 GB</text>
    <text x="368" y="98" class="body">Large memory tier for local models and map packs</text>
    <rect x="368" y="124" width="280" height="78" rx="18" fill="rgba(12,17,24,.92)" stroke="rgba(255,255,255,.06)" stroke-width="1.2"/>
    <text x="388" y="158" class="mono">log path · storage/logs</text>
    <text x="388" y="186" class="mono">updater · idle</text>

    <rect x="692" width="324" height="236" rx="24" class="soft"/>
    <text x="714" y="32" class="kicker">Recovery</text>
    <text x="714" y="70" class="cardTitle">Diagnostics lane</text>
    <text x="714" y="98" class="body">Open Settings, Debug Info, or the website manager when something needs a closer look.</text>
    <rect x="714" y="124" width="180" height="40" rx="18" class="tagBlue"/>
    <text x="756" y="150" class="mono" fill="#D7E4FF">Diagnostics</text>
    <rect x="714" y="174" width="146" height="40" rx="18" class="tagGreen"/>
    <text x="754" y="200" class="mono" fill="#E5FFF0">Debug Info</text>
  </g>
</svg>
