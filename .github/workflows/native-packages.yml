name: Native Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional existing GitHub release tag to attach the DMG and checksum to'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'native/macos/**'
      - 'native/windows/**'
      - 'branding/**'
      - 'scripts/**'
      - 'admin/**'
      - 'global.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-packages.yml'

permissions:
  contents: write

jobs:
  build-native:
    name: Build macOS
    runs-on: macos-latest
    env:
      APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID_APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm --prefix admin ci

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_DEVELOPER_ID_APP_CERT_BASE64 != '' && env.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD != '' }}
        env:
          APP_CERT_BASE64: ${{ env.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
          APP_CERT_PASSWORD: ${{ env.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-roachnet
        run: |
          CERT_PATH="$RUNNER_TEMP/roachnet-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/roachnet-signing.keychain-db"

          echo -n "$APP_CERT_BASE64" | openssl base64 -d -A -out "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "ROACHNET_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure notarization profile
        if: ${{ env.APPLE_NOTARY_APPLE_ID != '' && env.APPLE_NOTARY_APP_PASSWORD != '' && env.APPLE_NOTARY_TEAM_ID != '' && env.ROACHNET_SIGNING_KEYCHAIN != '' }}
        env:
          APPLE_ID: ${{ env.APPLE_NOTARY_APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ env.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials roachnet-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --keychain "$ROACHNET_SIGNING_KEYCHAIN"

          echo "ROACHNET_NOTARY_PROFILE=roachnet-notary" >> "$GITHUB_ENV"
          echo "ROACHNET_NOTARY_KEYCHAIN=$ROACHNET_SIGNING_KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build native macOS packages
        env:
          ROACHNET_CODESIGN_IDENTITY: ${{ env.APPLE_DEVELOPER_ID_APP_IDENTITY }}
          ROACHNET_NOTARY_PROFILE: ${{ env.ROACHNET_NOTARY_PROFILE }}
          ROACHNET_NOTARY_KEYCHAIN: ${{ env.ROACHNET_NOTARY_KEYCHAIN }}
        run: node scripts/build-native-macos-apps.mjs

      - name: Generate release checksum
        run: shasum -a 256 native/macos/dist/RoachNet-Setup-macOS.dmg > native/macos/dist/RoachNet-Setup-macOS.dmg.sha256

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roachnet-macos-native
          path: |
            native/macos/dist/RoachNet.app
            native/macos/dist/RoachNet Setup.app
            native/macos/dist/RoachNet-Setup-macOS.dmg
            native/macos/dist/RoachNet-Setup-macOS.dmg.sha256
          if-no-files-found: error

      - name: Upload release assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            native/macos/dist/RoachNet-Setup-macOS.dmg \
            native/macos/dist/RoachNet-Setup-macOS.dmg.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  build-native-windows-beta:
    name: Build Windows Beta
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore RoachNet Setup beta
        shell: pwsh
        run: |
          msbuild native/windows/RoachNet.Setup/RoachNet.Setup.csproj `
            /t:Restore `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifierOverride=win10-x64 `
            /p:UseRidGraph=true

      - name: Publish RoachNet Setup beta
        shell: pwsh
        run: |
          $setupPublishDir = Join-Path $env:GITHUB_WORKSPACE "native\\windows\\dist\\setup\\"
          msbuild native/windows/RoachNet.Setup/RoachNet.Setup.csproj `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifierOverride=win10-x64 `
            /p:UseRidGraph=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:SelfContained=true `
            /p:PublishSingleFile=false `
            /p:PublishDir=$setupPublishDir

      - name: Restore RoachNet App beta
        shell: pwsh
        run: |
          msbuild native/windows/RoachNet.App/RoachNet.App.csproj `
            /t:Restore `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifierOverride=win10-x64 `
            /p:UseRidGraph=true

      - name: Publish RoachNet App beta
        shell: pwsh
        run: |
          $appPublishDir = Join-Path $env:GITHUB_WORKSPACE "native\\windows\\dist\\app\\"
          msbuild native/windows/RoachNet.App/RoachNet.App.csproj `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifierOverride=win10-x64 `
            /p:UseRidGraph=true `
            /p:WindowsAppSDKSelfContained=true `
            /p:SelfContained=true `
            /p:PublishSingleFile=false `
            /p:PublishDir=$appPublishDir

      - name: Stage Windows beta bundle
        shell: pwsh
        run: |
          $bundleRoot = "native/windows/dist/RoachNet-Windows-Beta"
          Remove-Item -Recurse -Force $bundleRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "$bundleRoot/RoachNet Setup" | Out-Null
          New-Item -ItemType Directory -Force -Path "$bundleRoot/RoachNet App" | Out-Null
          Copy-Item -Recurse -Force native/windows/dist/setup/* "$bundleRoot/RoachNet Setup/"
          Copy-Item -Recurse -Force native/windows/dist/app/* "$bundleRoot/RoachNet App/"
          $setupExe = Get-ChildItem native/windows/dist/setup -Filter *.exe |
            Where-Object { $_.Name -match '^RoachNet(\.Setup)?\.exe$' -or $_.Name -match '^RoachNet.*Setup.*\.exe$' } |
            Select-Object -First 1
          if (-not $setupExe) {
            throw "Failed to locate the published RoachNet Setup executable."
          }
          Copy-Item -Force $setupExe.FullName native/windows/dist/RoachNet-Setup-windows-x64-beta.exe
          @'
          RoachNet Windows Beta v0.0.1

          This beta bundle includes:
          - RoachNet Setup.exe
          - RoachNet App.exe

          Scope:
          - Windows 11 x64 preview
          - native WinUI 3 shell and setup surfaces
          - beta distribution for early install and UI validation
          '@ | Set-Content -Path "$bundleRoot/README.txt"

      - name: Archive Windows beta bundle
        shell: pwsh
        run: |
          $zipPath = "native/windows/dist/RoachNet-Setup-windows-x64-beta.zip"
          Remove-Item -Force $zipPath -ErrorAction SilentlyContinue
          Compress-Archive -Path "native/windows/dist/RoachNet-Windows-Beta/*" -DestinationPath $zipPath

      - name: Upload Windows beta artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roachnet-windows-native-beta
          path: |
            native/windows/dist/RoachNet-Setup-windows-x64-beta.exe
            native/windows/dist/RoachNet-Setup-windows-x64-beta.zip
            native/windows/dist/RoachNet-Windows-Beta/README.txt
          if-no-files-found: error

      - name: Upload Windows beta release asset
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload $env:RELEASE_TAG `
            native/windows/dist/RoachNet-Setup-windows-x64-beta.exe `
            native/windows/dist/RoachNet-Setup-windows-x64-beta.zip `
            --repo $env:GITHUB_REPOSITORY `
            --clobber
