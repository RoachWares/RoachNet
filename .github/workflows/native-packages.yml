name: Native Packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional existing GitHub release tag to attach the DMG and checksum to'
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - 'native/macos/**'
      - 'branding/**'
      - 'scripts/**'
      - 'admin/**'
      - 'global.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-packages.yml'

permissions:
  contents: write

jobs:
  build-native:
    name: Build macOS
    runs-on: macos-latest
    env:
      APPLE_DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
      APPLE_DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
      APPLE_DEVELOPER_ID_APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            admin/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm --prefix admin ci

      - name: Import Developer ID certificate
        if: ${{ env.APPLE_DEVELOPER_ID_APP_CERT_BASE64 != '' && env.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD != '' }}
        env:
          APP_CERT_BASE64: ${{ env.APPLE_DEVELOPER_ID_APP_CERT_BASE64 }}
          APP_CERT_PASSWORD: ${{ env.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}-roachnet
        run: |
          CERT_PATH="$RUNNER_TEMP/roachnet-developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/roachnet-signing.keychain-db"

          echo -n "$APP_CERT_BASE64" | openssl base64 -d -A -out "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "ROACHNET_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure notarization profile
        if: ${{ env.APPLE_NOTARY_APPLE_ID != '' && env.APPLE_NOTARY_APP_PASSWORD != '' && env.APPLE_NOTARY_TEAM_ID != '' && env.ROACHNET_SIGNING_KEYCHAIN != '' }}
        env:
          APPLE_ID: ${{ env.APPLE_NOTARY_APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ env.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_NOTARY_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials roachnet-notary \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --keychain "$ROACHNET_SIGNING_KEYCHAIN"

          echo "ROACHNET_NOTARY_PROFILE=roachnet-notary" >> "$GITHUB_ENV"
          echo "ROACHNET_NOTARY_KEYCHAIN=$ROACHNET_SIGNING_KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build native macOS packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ROACHNET_CODESIGN_IDENTITY: ${{ env.APPLE_DEVELOPER_ID_APP_IDENTITY }}
          ROACHNET_NOTARY_PROFILE: ${{ env.ROACHNET_NOTARY_PROFILE }}
          ROACHNET_NOTARY_KEYCHAIN: ${{ env.ROACHNET_NOTARY_KEYCHAIN }}
        run: node scripts/build-native-macos-apps.mjs

      - name: Generate release checksum
        run: shasum -a 256 native/macos/dist/RoachNet-Setup-macOS.dmg > native/macos/dist/RoachNet-Setup-macOS.dmg.sha256

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roachnet-macos-native
          path: |
            native/macos/dist/RoachNet.app
            native/macos/dist/RoachNet Setup.app
            native/macos/dist/RoachNet-Setup-macOS.dmg
            native/macos/dist/RoachNet-Setup-macOS.dmg.sha256
          if-no-files-found: error

      - name: Upload release assets
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release upload "$RELEASE_TAG" \
            native/macos/dist/RoachNet-Setup-macOS.dmg \
            native/macos/dist/RoachNet-Setup-macOS.dmg.sha256 \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
