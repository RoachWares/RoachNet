name: Native Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'desktop/**'
      - 'scripts/**'
      - 'setup-ui/**'
      - 'admin/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/native-packages.yml'

jobs:
  build-native:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
          - os: windows-latest
            label: Windows
          - os: ubuntu-latest
            label: Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install admin dependencies
        run: npm --prefix admin ci

      - name: Install Linux packaging prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Typecheck admin
        run: npm --prefix admin run typecheck

      - name: Build admin bundle
        run: npm --prefix admin run build

      - name: Build native packages
        run: npm run desktop:dist

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roachnet-${{ runner.os }}-${{ runner.arch }}
          path: desktop-dist/*
          if-no-files-found: error
