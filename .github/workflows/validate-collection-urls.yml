name: Validate Collection URLs

on:
  push:
    branches:
      - main
    paths:
      - 'collections/**/*.json'
  pull_request:
    paths:
      - 'collections/**/*.json'

jobs:
  validate-urls:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate URLs
        run: |
          set -euo pipefail
          FAILED=0
          CHECKED=0
          FAILED_URLS=""

          # Recursively extract all non-null string URLs from every JSON file in collections/
          URLS=$(find collections -type f -name '*.json' -print0 | xargs -0 jq -r '.. | .url? | select(type == "string")' | sort -u)

          while IFS= read -r url; do
            [ -z "$url" ] && continue
            CHECKED=$((CHECKED + 1))
            printf "Checking: %s ... " "$url"

            # Prefer HEAD requests first because they avoid downloading body data.
            # Fall back to a 1-byte ranged GET for servers that reject HEAD.
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              --head \
              --max-time 30 \
              --location \
              "$url" || true)

            if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "206" ]; then
              HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
                --range 0-0 \
                --max-time 30 \
                --location \
                "$url" || true)
            fi

            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "206" ]; then
              echo "OK ($HTTP_CODE)"
            else
              echo "FAILED ($HTTP_CODE)"
              FAILED=$((FAILED + 1))
              FAILED_URLS="$FAILED_URLS\n  - $url (HTTP $HTTP_CODE)"
            fi
          done <<< "$URLS"

          echo ""
          echo "Checked $CHECKED URLs, $FAILED failed."

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "Broken URLs:"
            printf "%b\n" "$FAILED_URLS"
            exit 1
          fi
